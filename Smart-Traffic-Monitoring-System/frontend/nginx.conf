server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router routes must resolve to the SPA entry point on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints build assets, so they can be cached for a long time.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
