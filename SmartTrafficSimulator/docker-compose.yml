services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_TRAFFIC_WS_URL: ${TRAFFIC_WS_URL:-ws://localhost:8000/ws/traffic}
    environment:
      NEXT_PUBLIC_TRAFFIC_WS_URL: ${TRAFFIC_WS_URL:-ws://localhost:8000/ws/traffic}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
